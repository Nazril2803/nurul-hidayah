  <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Pelajaran Cerdas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="glass-card">
            <h1 id="real-time-day">Memuat Hari...</h1>
            <div id="real-time-clock">00:00:00</div>
            <p>Kelas XI - SMAN 1 Contoh</p>
        </header>

        <div class="controls">
            <button id="theme-toggle" class="btn-icon">🌙 Mode Gelap</button>
            <button id="voice-toggle" class="btn-icon">🔊 Suara: ON</button>
            <button id="add-btn" class="btn-primary">+ Jadwal</button>
        </div>

        <nav class="day-nav">
            <button class="day-btn active" data-day="Senin">Senin</button>
            <button class="day-btn" data-day="Selasa">Selasa</button>
            <button class="day-btn" data-day="Rabu">Rabu</button>
            <button class="day-btn" data-day="Kamis">Kamis</button>
            <button class="day-btn" data-day="Jumat">Jumat</button>
        </nav>

        <main id="schedule-list" class="schedule-container">
            </main>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content glass-card">
            <h2>Tambah Jadwal Baru</h2>
            <input type="text" id="mapel-name" placeholder="Nama Pelajaran (cth: Matematika)">
            <div class="input-group">
                <input type="time" id="start-time">
                <span>s/d</span>
                <input type="time" id="end-time">
            </div>
            <input type="text" id="teacher-name" placeholder="Nama Guru (Opsional)">
            <select id="day-select">
                <option value="Senin">Senin</option>
                <option value="Selasa">Selasa</option>
                <option value="Rabu">Rabu</option>
                <option value="Kamis">Kamis</option>
                <option value="Jumat">Jumat</option>
            </select>
            <div class="modal-actions">
                <button id="save-btn" class="btn-primary">Simpan</button>
                <button id="close-btn" class="btn-danger">Batal</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
